apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluegreen-deploy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/marcuwynu23/bluegreen-deploy-helm
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: bluegreen
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
