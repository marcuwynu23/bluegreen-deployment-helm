apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: argocd
spec:
  args:
  - name: service-name
  metrics:
  - name: success-rate
    interval: 1m
    count: 10
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus-server.prometheus.svc.cluster.local
        query: |
          sum(rate(http_requests_total{service="{{args.service-name}}",code!~"5.."}[1m])) /
          sum(rate(http_requests_total{service="{{args.service-name}}"}[1m]))
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: web-response-time
  namespace: argocd
spec:
  args:
  - name: url
  metrics:
  - name: web-response-time
    interval: 30s
    count: 5
    successCondition: result[0] < 500
    failureLimit: 2
    provider:
      web:
        url: "{{args.url}}"
        jsonPath: "{$.response_time}"
