# Production values override
global:
  namespace: production

backend:
  replicaCount: 5
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  rollout:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 60

frontend:
  replicaCount: 3
  
  ingress:
    hosts:
      - host: app.production.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-production-tls
        hosts:
          - app.production.example.com
  
  hpa:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  rollout:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 60
  
  env:
    - name: VITE_API_URL
      value: https://api.production.example.com

namespace:
  name: bluegreen-production
