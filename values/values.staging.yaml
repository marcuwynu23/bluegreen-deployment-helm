# Staging values override
global:
  namespace: staging

backend:
  replicaCount: 2
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  rollout:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 30

frontend:
  replicaCount: 2
  
  ingress:
    hosts:
      - host: app.staging.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-staging-tls
        hosts:
          - app.staging.example.com
  
  hpa:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85
  
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 150m
      memory: 128Mi
  
  rollout:
    autoPromotionEnabled: true
    scaleDownDelaySeconds: 30
  
  env:
    - name: VITE_API_URL
      value: http://backend-service:3000

namespace:
  name: bluegreen-staging
