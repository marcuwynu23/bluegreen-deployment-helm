apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend-rollout
  namespace: {{ .Values.namespace.name | default .Values.global.namespace }}
  labels:
    {{- include "bluegreen-deploy.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    {{- if eq .Values.backend.rollout.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ .Values.backend.rollout.activeService }}
      previewService: {{ .Values.backend.rollout.previewService }}
      autoPromotionEnabled: {{ .Values.backend.rollout.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ .Values.backend.rollout.scaleDownDelaySeconds }}
      prePromotionAnalysis:
        templates:
        - templateName: success-rate
        args:
        - name: service-name
          value: {{ .Values.backend.rollout.previewService }}
      postPromotionAnalysis:
        templates:
        - templateName: success-rate
        args:
        - name: service-name
          value: {{ .Values.backend.rollout.activeService }}
    {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.targetPort }}
          name: http
          protocol: TCP
        env:
        {{- range .Values.backend.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
